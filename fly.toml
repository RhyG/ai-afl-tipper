# fly.toml app configuration file generated for ai-afl-tipper on 2026-03-30T19:18:36+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-afl-tipper'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = 'afl_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
